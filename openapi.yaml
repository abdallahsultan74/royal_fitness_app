components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
      description: Set apikey to your Supabase anon/service-role key.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Authorization: Bearer {access_token}'
  parameters:
    Select:
      name: select
      in: query
      required: false
      schema:
        type: string
      description: PostgREST select.
    Order:
      name: order
      in: query
      required: false
      schema:
        type: string
      description: PostgREST order.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: PostgREST limit
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: PostgREST offset
    PreferReturnRepresentation:
      name: Prefer
      in: header
      required: false
      schema:
        type: string
      description: Prefer header.
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    JsonArray:
      type: array
      items:
        $ref: '#/components/schemas/JsonObject'
  responses:
    JsonAny:
      description: JSON (any)
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/JsonObject'
            - $ref: '#/components/schemas/JsonArray'
    JsonArray:
      description: JSON array
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonArray'
