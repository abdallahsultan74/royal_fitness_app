openapi: 3.0.3
info:
  title: Royal Fitness - Supabase API
  version: 1.0.0
  description: |
    English documentation for the Supabase APIs used by Royal Fitness.

    Notes:
    - PostgREST: /rest/v1
    - Auth (GoTrue): /auth/v1
    - RPC: /rest/v1/rpc/{function}
    - Realtime (WebSocket): wss://{projectRef}.supabase.co/realtime/v1 (reference only)
servers:
- url: https://thndmcqsjoejqnvfbnto.supabase.co
  description: Supabase Project
tags:
- name: Auth
- name: Profiles
- name: Workouts
- name: Progress
- name: Challenges
- name: Plans
- name: Subscriptions
- name: Notifications
- name: RPC
- name: Admin
x-tagGroups:
- name: Mobile App
  tags:
  - Auth
  - Profiles
  - Workouts
  - Progress
  - Challenges
  - Plans
  - Subscriptions
  - Notifications
  - RPC
- name: Admin Dashboard
  tags:
  - Admin
security:
- ApiKeyAuth: []
  BearerAuth: []
paths:
  /auth/v1/signup:
    post:
      tags:
      - Auth
      summary: POST /auth/v1/signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              signup:
                value:
                  email: user@example.com
                  password: P@ssw0rd!
                  data:
                    name: User
                    language: ar
      responses:
        '200':
          description: OK
  /auth/v1/token:
    post:
      tags:
      - Auth
      summary: POST /auth/v1/token
      parameters:
      - in: query
        name: grant_type
        required: true
        schema:
          type: string
          enum:
          - password
          - refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              password:
                value:
                  email: user@example.com
                  password: P@ssw0rd!
      responses:
        '200':
          description: OK
  /auth/v1/otp:
    post:
      tags:
      - Auth
      summary: POST /auth/v1/otp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              sendOtp:
                value:
                  email: user@example.com
                  should_create_user: false
      responses:
        '200':
          description: OK
  /auth/v1/verify:
    post:
      tags:
      - Auth
      summary: POST /auth/v1/verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              verifyEmailOtp:
                value:
                  type: email
                  email: user@example.com
                  token: '123456'
      responses:
        '200':
          description: OK
  /auth/v1/recover:
    post:
      tags:
      - Auth
      summary: POST /auth/v1/recover
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              recover:
                value:
                  email: user@example.com
                  redirect_to: com.royalfitness.royal_fitness://reset-password
      responses:
        '200':
          description: OK
  /auth/v1/user:
    put:
      tags:
      - Auth
      summary: PUT /auth/v1/user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              updatePassword:
                value:
                  password: NewStrongPass!
      responses:
        '200':
          description: OK
  /auth/v1/logout:
    post:
      tags:
      - Auth
      summary: POST /auth/v1/logout
      responses:
        '200':
          description: OK
